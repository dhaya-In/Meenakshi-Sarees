services:
  - type: web
    name: meenakshi-sarees-backend
    runtime: node
    rootDir: meenakshi-backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: UPI_ID
        value: 6380768419@ibl
      - key: UPI_NAME
        value: Meenakshi Sarees
      - key: SHOP_WHATSAPP_NUMBER
        value: "916380768419"
      - key: MAX_FILE_SIZE_MB
        value: "15"
      - key: UPLOAD_PATH
        value: ./uploads
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: STORE_EMAIL
        sync: false
